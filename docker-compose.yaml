x-common-env: &common-env
  CONNECTION_STRING: "Host=postgres;Port=5432;Database=currency_db;Username=postgres;Password=postgres"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: currency_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  migration-runner:
    build:
      context: .
      dockerfile: Migration.Runner/Dockerfile
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy

  currency-updater:
    build:
      context: .
      dockerfile: CurrencyUpdater.Worker/Dockerfile
    environment:
      <<: *common-env
    depends_on:
      migration-runner:
        condition: service_completed_successfully
    restart: always

  user-service:
    build:
      context: .
      dockerfile: UserService.API/Dockerfile
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=currency_db;Username=postgres;Password=postgres"
      Jwt__SecretKey: "Was vernuenftig ist, das ist wirklich; und was wirklich ist, das ist vernuenftig"
      Jwt__Issuer: "CurrencyWatch"
      Jwt__Audience: "CurrencyWatch"
      Jwt__ExpirationMinutes: "15"
    ports:
      - "5001:8080"
    depends_on:
      migration-runner:
        condition: service_completed_successfully

volumes:
  postgres_data:
